intro: Organisation der Schulungen
bio: >
  Britta Lenzen ist der Dreh- und Angelpunkt der Schulungs-Organisation bei Workshops.DE. Sie koordiniert die gesamte Terminplanung, stimmt individuelle Schulungsanfragen mit den Trainern ab und sorgt dafür, dass jeder Workshop reibungslos abläuft – von der ersten Anfrage bis zum Follow-up nach der Schulung. Dank ihrer langjährigen Erfahrung in der Organisation von über 500 Schulungen kennt sie die Bedürfnisse der Teilnehmer genau und stellt sicher, dass jedes Training ein angenehmes und produktives Erlebnis wird. Ob Inhouse-Schulung, offener Workshop oder Remote-Training: Britta ist die erste Ansprechpartnerin für alle organisatorischen Fragen rund um die React-, Angular- und Vue.js-Schulungen.
