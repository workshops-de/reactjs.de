bio: >
  Robin Böhm beschäftigt sich seit 2012 intensiv mit der Erstellung client-seitiger Web-Applikationen und gilt als einer der erfahrensten Frontend-Trainer im deutschsprachigen Raum. Als Gründer von Workshops.DE hat er ein Schulungsunternehmen aufgebaut, das sich auf moderne Web-Technologien wie React, Angular und Vue.js spezialisiert hat. Über 8.000 Teilnehmer haben bereits an seinen Schulungen teilgenommen. Robin ist außerdem Initiator der Community-Portale ReactJS.DE, Angular.DE und VueJS.DE, die zusammen eine der größten deutschsprachigen Frontend-Communities bilden. Neben seiner Tätigkeit als Trainer und Unternehmer teilt er sein Wissen regelmäßig auf Konferenzen, in Fachartikeln und über den Community-Newsletter mit über 5.000 Abonnenten.
