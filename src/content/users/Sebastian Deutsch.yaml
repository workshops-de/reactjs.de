  Gründer von 9elements.com
bio: >
  Sebastian Deutsch ist Gründer und Geschäftsführer von 9elements, einer Softwareagentur mit Sitz in Bochum, die sich auf hochwertige Web-Applikationen und kreative Technologie spezialisiert hat. Er arbeitet mit React seit dem initialen Release der Bibliothek im Jahr 2013 und gehört damit zu den erfahrensten React-Entwicklern in Deutschland. Als Trainer bei Workshops.DE gibt er sein umfangreiches Praxiswissen an Entwicklerteams weiter – von den Grundlagen moderner Komponentenarchitektur bis hin zu fortgeschrittenen Themen wie Server Components, State Management und Performance-Optimierung. Sebastian ist außerdem leidenschaftlicher Open-Source-Contributor und teilt sein Wissen regelmäßig auf Konferenzen und in Fachpublikationen. Wenn er nicht programmiert, fährt er mit seinem OneWheel durch das Ruhrgebiet.
