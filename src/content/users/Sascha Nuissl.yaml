bio: >
  Sascha Nuissl ist unabhängiger Software Engineer und Designer mit Fokus auf moderne Web-Technologien und Developer Experience. Für Workshops.DE entwickelt und pflegt er die gesamte technische Infrastruktur – von der Hauptwebsite über die Community-Portale ReactJS.DE, Angular.DE und VueJS.DE bis hin zu internen Tools und Automatisierungen. In seiner Freizeit taucht er am liebsten tief in den KI-Tunnel ab und testet alles aus, was die Welt der künstlichen Intelligenz zu bieten hat – von neuen Modellen und Tools bis hin zu kreativen Anwendungsfällen.
